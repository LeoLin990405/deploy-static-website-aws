AWSTemplateFormatVersion: "2010-09-09"
Description: Static website hosting on S3 with CloudFront CDN for the Udacity Deploy Static Website on AWS project.

Parameters:
  BucketName:
    Type: String
    Description: Globally unique S3 bucket name for the static website.

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Udacity static website CDN for ${BucketName}"
        DefaultRootObject: index.html
        Origins:
          - Id: S3WebsiteOrigin
            DomainName:
              Fn::Select:
                - 1
                - Fn::Split:
                    - "//"
                    - Fn::GetAtt:
                        - WebsiteBucket
                        - WebsiteURL
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400
        PriceClass: PriceClass_100

Outputs:
  BucketName:
    Description: S3 bucket name.
    Value: !Ref WebsiteBucket
  WebsiteEndpoint:
    Description: S3 static website endpoint.
    Value: !GetAtt WebsiteBucket.WebsiteURL
  CloudFrontDomainName:
    Description: CloudFront distribution domain name.
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontURL:
    Description: Public CloudFront website URL.
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
